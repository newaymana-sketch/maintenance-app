<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>سجل الصيانة</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#0B0F12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>
<style>
  :root{
    --bg:#0B0F12;
    --surface:#262D35;
    --surface-2:#2E3640;
    --ink:#FFFFFF;
    --ink-dim:#A7AEB5;
    --amber:#F4C430;
    --amber-dim:#3a3320;
    --green:#3DDC84;
    --red:#FF5C5C;
    --border:#4A535E;
    /* أقصى تباين للبطاقات الرئيسية — للقراءة تحت ضوء الشمس المباشر */
    --tile-bg:#FFFFFF;
    --tile-ink:#0B0F12;
    --tile-border:#0B0F12;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans Arabic', sans-serif; overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;}
  body{ padding-bottom: 90px; }
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ---------- Status bar (signature element) ---------- */
  .statusbar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; background:rgba(11,15,18,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
  }
  .statusbar .title{font-weight:700; font-size:15px; letter-spacing:.2px;}
  .sync-pulse{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ink-dim);}
  .sync-dot{width:8px; height:8px; border-radius:50%; background:var(--amber); position:relative;}
  .sync-dot.ok{background:var(--green);}
  .sync-dot.pending{background:var(--amber); animation:pulse 1.4s ease-in-out infinite;}
  .sync-dot.off{background:var(--ink-dim);}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(244,196,48,.5);}
    50%{box-shadow:0 0 0 6px rgba(244,196,48,0);}
  }

  /* ---------- Layout ---------- */
  .wrap{padding:16px; max-width:520px; margin:0 auto;}
  .signin-banner{
    background:var(--amber-dim); border:1px solid var(--amber); border-radius:12px;
    padding:14px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .signin-text{display:flex; flex-direction:column; gap:3px; flex:1;}
  .signin-text b{font-size:13.5px; color:var(--amber);}
  .signin-text span{font-size:11.5px; color:var(--ink-dim);}
  .signin-btn{
    background:var(--amber); color:#1A1500; border:none; border-radius:9px;
    padding:9px 14px; font-weight:700; font-size:12.5px; white-space:nowrap;
  }
  .section-label{
    font-size:12px; color:var(--ink-dim); font-weight:600; letter-spacing:.5px;
    margin:22px 4px 10px; display:flex; align-items:center; gap:6px;
  }
  .section-label::after{content:""; flex:1; height:1px; background:var(--border);}

  /* ---------- Fast action tiles ---------- */
  /* أقصى تباين ممكن (أبيض/أسود) لقراءة واضحة تحت ضوء الشمس المباشر */
  .tiles{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .tile{
    background:var(--tile-bg); border:2px solid var(--tile-border); border-radius:14px;
    padding:16px 12px; text-align:right; transition:transform .12s, opacity .12s;
    display:flex; flex-direction:column; gap:8px; min-height:92px; position:relative; overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  .tile:active{transform:scale(.96); opacity:.85;}
  .tile .ic{font-size:24px;}
  .tile .lbl{font-weight:800; font-size:15px; color:var(--tile-ink);}
  .tile .stripe{position:absolute; right:0; top:0; bottom:0; width:6px;}

  /* ---------- Recent log (ticket stubs) ---------- */
  .ticket{
    background:var(--tile-bg); border:2px dashed var(--tile-border); border-radius:10px;
    padding:12px 14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .ticket .meta{flex:1; min-width:0;}
  .ticket .meta .top{font-size:13.5px; font-weight:800; color:var(--tile-ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .ticket .meta .sub{font-size:11.5px; color:#3A3F45; margin-top:2px; font-weight:600;}
  .ticket .amt{font-weight:800; font-size:14px; color:var(--tile-ink); white-space:nowrap;}
  .ticket .pill{
    font-size:10px; padding:2px 7px; border-radius:20px; font-weight:700; white-space:nowrap;
  }
  .pill.synced{background:#E3F8EC; color:#15803D;}
  .pill.pending{background:#FFF3D6; color:#92650A;}
  .pill.failed{background:#FDE2E2; color:#B91C1C;}
  .ticket-wrap{margin-bottom:8px;}
  .ticket-wrap .ticket{margin-bottom:0; border-radius:10px 10px 0 0;}
  .error-detail{
    background:#FDE2E2; border:2px dashed var(--tile-border); border-top:none;
    border-radius:0 0 10px 10px; padding:8px 14px; display:flex; align-items:center;
    justify-content:space-between; gap:8px;
  }
  .error-detail span{font-size:11px; color:#7A1313; flex:1; word-break:break-word;}
  .error-detail button{
    background:#B91C1C; color:#fff; border:none; border-radius:7px; padding:6px 10px;
    font-size:11px; font-weight:700; white-space:nowrap;
  }
  .empty-state{
    text-align:center; padding:30px 10px; color:var(--ink-dim); font-size:13px;
    border:1px dashed var(--border); border-radius:12px;
  }

  /* ---------- Bottom sheet (form) ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:90;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .sheet-backdrop.open{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; right:0; left:0; bottom:0; z-index:91;
    background:var(--surface); border-radius:20px 20px 0 0;
    border-top:1px solid var(--border);
    max-height:88vh; overflow-y:auto;
    transform:translateY(100%); transition:transform .25s cubic-bezier(.32,.72,0,1);
    padding:14px 18px 24px;
  }
  .sheet.open{transform:translateY(0);}
  .sheet-handle{width:38px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 14px;}
  .sheet-title{font-size:17px; font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:8px;}
  .sheet-sub{font-size:12.5px; color:var(--ink-dim); margin-bottom:18px;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; color:var(--ink-dim); margin-bottom:6px; font-weight:600;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--ink);
    border-radius:10px; padding:12px 14px; font-size:15px; outline:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--amber);}
  .field textarea{resize:none; min-height:64px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .calc-line{
    display:flex; justify-content:space-between; font-size:13px; padding:6px 0;
    border-bottom:1px solid var(--border); color:var(--ink-dim);
  }
  .calc-line b{color:var(--ink); font-weight:600;}
  .calc-line.total{border-bottom:none; padding-top:10px; font-size:15px;}
  .calc-line.total b{color:var(--amber); font-size:17px;}

  .submit-btn{
    width:100%; padding:15px; border-radius:12px; border:none; background:var(--amber);
    color:#1A1500; font-weight:700; font-size:15px; margin-top:8px;
  }
  .submit-btn:active{opacity:.85;}
  .cancel-btn{
    width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:transparent;
    color:var(--ink-dim); font-weight:600; font-size:13.5px; margin-top:8px;
  }
  .tab-btn{
    flex:1; padding:11px 8px; border-radius:10px; border:1px solid var(--border); background:var(--surface-2);
    color:var(--ink-dim); font-weight:700; font-size:13px;
  }
  .tab-btn.active{background:var(--amber); color:#1A1500; border-color:var(--amber);}

  /* ---------- Custom dropdown (full contrast control) ---------- */
  .dd{position:relative;}
  .dd-trigger{
    width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--ink);
    border-radius:10px; padding:12px 14px; font-size:15px; text-align:right;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .dd-trigger .arrow{color:var(--ink-dim); font-size:11px; transition:transform .15s;}
  .dd-trigger.placeholder{color:var(--ink-dim);}
  .dd.open .dd-trigger{border-color:var(--amber);}
  .dd.open .dd-trigger .arrow{transform:rotate(180deg);}
  .dd-panel{
    display:none; position:absolute; top:calc(100% + 6px); right:0; left:0; z-index:40;
    background:#15181B; border:1px solid var(--border); border-radius:12px;
    max-height:280px; overflow-y:auto; box-shadow:0 12px 28px rgba(0,0,0,.5);
  }
  .dd.open .dd-panel{display:block;}
  .dd-option{
    padding:13px 16px; font-size:14.5px; color:var(--ink); cursor:pointer;
    border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;
  }
  .dd-option:last-child{border-bottom:none;}
  .dd-option:active{background:var(--surface-2);}
  .dd-option.selected{color:var(--amber); font-weight:600; background:rgba(244,196,48,.08);}
  .dd-group-label{
    padding:8px 16px; font-size:10.5px; color:var(--ink-dim); font-weight:700; letter-spacing:.5px;
    background:#0F1215; position:sticky; top:0;
  }

  .toast{
    position:fixed; bottom:100px; right:50%; transform:translateX(50%) translateY(20px);
    background:var(--green); color:#08240F; font-weight:700; font-size:13.5px;
    padding:12px 20px; border-radius:30px; z-index:99; opacity:0; transition:all .25s;
    pointer-events:none; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(50%) translateY(0);}
  .toast.err{background:var(--red); color:#2A0707;}

  ::selection{background:var(--amber); color:#000;}
</style>
</head>
<body>

  <div class="statusbar">
    <div class="title">📋 سجل الصيانة</div>
    <div class="sync-pulse" id="syncIndicator" onclick="onSyncIndicatorClick()">
      <span class="sync-dot off" id="syncDot"></span>
      <span id="syncText">محلي فقط</span>
    </div>
  </div>

  <div class="wrap">

    <div id="signinBanner" class="signin-banner" style="display:none;">
      <div class="signin-text">
        <b>سجّل دخولك بحساب Microsoft</b>
        <span>لتعمل القوائم والمزامنة مباشرة من ملفاتك الحقيقية على OneDrive</span>
      </div>
      <button class="signin-btn" onclick="signIn()">تسجيل الدخول</button>
    </div>


    <div class="section-label">إجراءات سريعة</div>
    <div class="tiles" id="tilesGrid"></div>

    <div class="section-label">آخر العمليات</div>
    <div id="recentList"></div>

  </div>

  <div class="sheet-backdrop" id="backdrop"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheetBody"></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
/* =========================================================
   حارس أخطاء عام — لو حصل خطأ غير متوقع في الكود، تظهر رسالة
   واضحة في الصفحة بدل أن تبقى الشاشة فارغة بصمت تام
   ========================================================= */
window.addEventListener('error', (e)=>{
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;top:0;right:0;left:0;background:#B91C1C;color:#fff;padding:14px;font-size:12px;z-index:9999;direction:rtl;font-family:sans-serif;';
  banner.textContent = '⚠️ خطأ تقني في التطبيق: ' + (e.message || 'غير معروف') + ' — السطر ' + (e.lineno||'?');
  document.body && document.body.prepend(banner);
});

/* =========================================================
   المصادقة — Microsoft Graph API عبر MSAL.js
   حساب شخصي، صلاحية Files.ReadWrite فقط (الوصول لملفاتك في OneDrive)
   ========================================================= */
const MSAL_CONFIG = {
  auth: {
    clientId: '5f9ed429-26b7-4506-bfe6-4bebe20fb5fa',
    authority: 'https://login.microsoftonline.com/consumers',
    redirectUri: window.location.href.split('?')[0].split('#')[0],
  },
  cache: {
    cacheLocation: 'localStorage', // يبقى تسجيل الدخول محفوظاً بين الجلسات
  },
};
const GRAPH_SCOPES = ['Files.ReadWrite'];

let msalInstance = null;
let currentAccount = null;

/* اسما الملفين على OneDrive — جذر المجلد (root). إن كانت الملفات داخل مجلد فرعي،
   يجب تعديل المسار هنا إلى مثلاً 'root:/مجلد الصيانة/mali_v4-5_updated.xlsx:' */
const ONEDRIVE_FILES = {
  mali: 'FUJI/mali_v4-5_updated.xlsx',
  fuji: 'FUJI/fuji_v4-5_updated.xlsx',
};

async function initAuth(){
  msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
  await msalInstance.initialize();
  // معالجة العودة من صفحة تسجيل الدخول (إن وُجدت)
  const response = await msalInstance.handleRedirectPromise();
  if(response && response.account){
    currentAccount = response.account;
  } else {
    const accounts = msalInstance.getAllAccounts();
    if(accounts.length > 0) currentAccount = accounts[0];
  }
  updateAuthUI();
}

function signIn(){
  msalInstance.loginRedirect({ scopes: GRAPH_SCOPES });
}

function signOut(){
  msalInstance.logoutRedirect();
}

async function getGraphToken(){
  if(!currentAccount) return null;
  try{
    const result = await msalInstance.acquireTokenSilent({
      scopes: GRAPH_SCOPES,
      account: currentAccount,
    });
    return result.accessToken;
  } catch(e){
    // الجلسة الصامتة فشلت (مثلاً انتهت صلاحية الجلسة) — يحتاج تسجيل دخول تفاعلي
    console.error('فشل الحصول على رمز الدخول بصمت', e);
    return null;
  }
}

function updateAuthUI(){
  const banner = document.getElementById('signinBanner');
  if(currentAccount){
    banner.style.display = 'none';
  } else {
    banner.style.display = 'flex';
  }
}

function onSyncIndicatorClick(){
  if(!currentAccount){
    signIn();
  }
}

/* =========================================================
   طبقة الاتصال بـ Microsoft Graph — قراءة/كتابة جداول الإكسل
   ========================================================= */
const GRAPH_BASE = 'https://graph.microsoft.com/v1.0/me/drive/root:/';

/* ترميز مسار يحتوي مجلدات فرعية بأمان: يُرمَّز كل جزء على حدة، وتبقى / حرفية بينها */
function encodeGraphPath(path){
  return path.split('/').map(encodeURIComponent).join('/');
}

/* بيانات كل جدول: ورقة العمل، صف أول بيانات حقيقية، آخر حرف عمود (لبناء عنوان النطاق) */
const TABLE_META = {
  tblFuji:    { sheet: '📋 سجل_العمل',     firstDataRow: 5,   lastCol: 'S', keyCol: 'B' },  // B = التاريخ
  tblSegel:   { sheet: '📋 السجل اليومي',  firstDataRow: 5,   lastCol: 'M', keyCol: 'B' },  // B = التاريخ
  tblHistory: { sheet: '🏍️ محور المكنة', firstDataRow: 141, lastCol: 'I', keyCol: 'B' },  // B = تاريخ التغيير
};

async function graphGetTableRows(fileKey, tableName, columnName){
  const token = await getGraphToken();
  if(!token) return null;
  const fileName = ONEDRIVE_FILES[fileKey];
  const url = `${GRAPH_BASE}${encodeGraphPath(fileName)}:/workbook/tables('${tableName}')/columns('${encodeURIComponent(columnName)}')/range`;
  const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
  if(!res.ok) throw new Error('فشل قراءة الجدول: '+res.status);
  const data = await res.json();
  // نستخدم "text" لا "values": القيم الخام تحوّل التواريخ لأرقام تسلسلية (مثل 44146 بدل التاريخ)
  // الصف الأول هو رأس العمود، نتجاهله
  return (data.text || []).slice(1).map(r=>r[0]).filter(v=>v !== '' && v !== null);
}

/* البحث عن أول صف فارغ فعلياً (بعد آخر بيانات حقيقية) — يقرأ عمود المفتاح فقط، سريع وخفيف */
async function findFirstEmptyRow(fileKey, tableName){
  const token = await getGraphToken();
  if(!token) throw new Error('لا يوجد رمز دخول صالح');
  const meta = TABLE_META[tableName];
  const fileName = ONEDRIVE_FILES[fileKey];
  const sheetPart = encodeURIComponent(meta.sheet);
  // نقرأ عمود المفتاح بالكامل من أول صف بيانات حتى نهاية الجدول الممدود لنحدد آخر صف مكتوب فعلياً
  const lastPossibleRow = meta.firstDataRow + 1500; // سعة كافية أكبر من أي مدى متوقع
  const rangeAddr = `${meta.keyCol}${meta.firstDataRow}:${meta.keyCol}${lastPossibleRow}`;
  const url = `${GRAPH_BASE}${encodeGraphPath(fileName)}:/workbook/worksheets/${sheetPart}/range(address='${rangeAddr}')`;
  const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
  if(!res.ok) throw new Error('فشل تحديد آخر صف: '+res.status);
  const data = await res.json();
  const values = data.values || [];
  let lastFilledIndex = -1;
  for(let i=0; i<values.length; i++){
    if(values[i][0] !== '' && values[i][0] !== null) lastFilledIndex = i;
  }
  return meta.firstDataRow + lastFilledIndex + 1; // الصف التالي مباشرة بعد آخر بيانات
}

/* كتابة صف جديد مباشرة في أول صف فارغ فعلياً، بدل الإضافة في نهاية مدى الجدول الممدود */
/* تحويل {B:'x', C:'y', H:'z'} إلى مجموعات أعمدة متجاورة لتقليل عدد طلبات الشبكة
   مثال: B,C,D,E مجموعة واحدة، فجوة عند F,G (محسوبة)، ثم H,I,J... مجموعة ثانية */
function groupContiguousColumns(cells){
  const colToNum = (c)=> c.split('').reduce((acc,ch)=>acc*26+(ch.charCodeAt(0)-64), 0);
  const entries = Object.keys(cells)
    .map(col => ({col, num: colToNum(col), val: cells[col]}))
    .sort((a,b)=>a.num-b.num);
  const groups = [];
  let current = null;
  for(const e of entries){
    if(current && e.num === current.endNum + 1){
      current.endCol = e.col; current.endNum = e.num; current.values.push(e.val);
    } else {
      if(current) groups.push(current);
      current = {startCol: e.col, endCol: e.col, endNum: e.num, values: [e.val]};
    }
  }
  if(current) groups.push(current);
  return groups;
}

/* كتابة صف جديد بدون لمس أي عمود محسوب — فقط الأعمدة الحقيقية، في أول صف فارغ فعلياً */
async function graphAddTableRow(fileKey, tableName, cells){
  const token = await getGraphToken();
  if(!token) throw new Error('لا يوجد رمز دخول صالح');
  const meta = TABLE_META[tableName];
  const fileName = ONEDRIVE_FILES[fileKey];
  const sheetPart = encodeURIComponent(meta.sheet);

  const targetRow = await findFirstEmptyRow(fileKey, tableName);
  const groups = groupContiguousColumns(cells);

  for(const g of groups){
    const rangeAddr = `${g.startCol}${targetRow}:${g.endCol}${targetRow}`;
    const url = `${GRAPH_BASE}${encodeGraphPath(fileName)}:/workbook/worksheets/${sheetPart}/range(address='${rangeAddr}')`;
    const res = await fetch(url, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ values: [g.values] }),
    });
    if(!res.ok){
      const errText = await res.text();
      throw new Error(`فشلت الكتابة (${res.status}): ${errText}`);
    }
  }
  return { row: targetRow };
}

/* =========================================================
   البيانات الحيّة — تُقرأ من tblClients (fuji) و tblParties (mali)
   عبر Graph API عند توفر تسجيل دخول واتصال، وتُخزَّن محلياً (cache)
   لتعمل دون اتصال أيضاً. القيم أدناه هي نسخة احتياطية أولية فقط،
   تُستبدل فوراً بالبيانات الحقيقية بعد أول تحميل ناجح.
   ========================================================= */
let CLIENTS_FUJI = ["شربين","المحلة","خليفة","الأطفال","بنها","مصنع الغزل","طنطا","الحامول","الزقازيق","شبراهور","السلاب","بورسعيد","بلطيم"];
let OWNERS = ["عمر أبو العز","محسن"];
let CLIENTS_BY_OWNER = {
  "عمر أبو العز": ["الحج إبراهيم","صبح","الشريف","عويضة"],
  "محسن": [],
};
let ALL_CLIENTS = Object.values(CLIENTS_BY_OWNER).flat();

/* تحميل القوائم الحقيقية من الإكسل عبر Graph API، مع تخزين نسخة محلية للعمل دون اتصال */
async function refreshLiveLists(){
  if(!currentAccount) return; // غير مسجّل دخول — نبقى على آخر نسخة محلية معروفة
  try{
    const [fujiClients, partiesNames, partiesRoles, partiesLinks] = await Promise.all([
      graphGetTableRows('fuji', 'tblClients', 'اسم العميل'),
      graphGetTableRows('mali', 'tblParties', 'الاسم'),
      graphGetTableRows('mali', 'tblParties', 'الدور'),
      graphGetTableRows('mali', 'tblParties', 'مرتبط بـ (صاحب العمل)'),
    ]);

    if(fujiClients && fujiClients.length){
      CLIENTS_FUJI = fujiClients;
      localStorage.setItem('cache_clients_fuji', JSON.stringify(CLIENTS_FUJI));
    }

    if(partiesNames && partiesNames.length){
      const owners = [];
      const byOwner = {};
      partiesNames.forEach((name, i)=>{
        if(!name || name.startsWith('(أضف')) return; // تجاهل صفوف "أضف عميل" الفارغة
        const role = (partiesRoles[i]||'').trim();
        const linkedTo = (partiesLinks[i]||'').trim();
        if(role.includes('صاحب عمل')){
          owners.push(name);
          if(!byOwner[name]) byOwner[name] = [];
        } else {
          if(linkedTo && linkedTo !== '—'){
            if(!byOwner[linkedTo]) byOwner[linkedTo] = [];
            byOwner[linkedTo].push(name);
          }
        }
      });
      OWNERS = owners;
      CLIENTS_BY_OWNER = byOwner;
      ALL_CLIENTS = Object.values(CLIENTS_BY_OWNER).flat();
      localStorage.setItem('cache_owners', JSON.stringify(OWNERS));
      localStorage.setItem('cache_clients_by_owner', JSON.stringify(CLIENTS_BY_OWNER));
    }
  } catch(e){
    console.error('فشل تحميل القوائم الحية، نستخدم آخر نسخة محفوظة', e);
  }
}

/* استرجاع آخر نسخة محلية محفوظة (للعمل دون اتصال فور فتح التطبيق) */
function loadCachedLists(){
  try{
    const cf = localStorage.getItem('cache_clients_fuji');
    if(cf) CLIENTS_FUJI = JSON.parse(cf);
    const ow = localStorage.getItem('cache_owners');
    if(ow) OWNERS = JSON.parse(ow);
    const cbo = localStorage.getItem('cache_clients_by_owner');
    if(cbo){ CLIENTS_BY_OWNER = JSON.parse(cbo); ALL_CLIENTS = Object.values(CLIENTS_BY_OWNER).flat(); }
  } catch(e){ console.error('فشل تحميل النسخة المحلية المخزّنة', e); }
}

/* =========================================================
   طبقة التخزين المحلي — IndexedDB
   كل عملية تُكتب هنا فوراً وبشكل دائم، بمعزل عن نجاح المزامنة
   ========================================================= */
const DB_NAME = 'maintenance_log_db';
const DB_VERSION = 1;
let db;

function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e)=>{
      const _db = e.target.result;
      if(!_db.objectStoreNames.contains('entries')){
        const store = _db.createObjectStore('entries', {keyPath:'id', autoIncrement:true});
        store.createIndex('synced','synced');
        store.createIndex('createdAt','createdAt');
      }
    };
    req.onsuccess = (e)=>resolve(e.target.result);
    req.onerror = (e)=>reject(e);
  });
}

function addEntry(entry){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('entries','readwrite');
    const store = tx.objectStore('entries');
    entry.synced = false;
    entry.createdAt = new Date().toISOString();
    const req = store.add(entry);
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = (e)=>reject(e);
  });
}

function getAllEntries(){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('entries','readonly');
    const store = tx.objectStore('entries');
    const req = store.getAll();
    req.onsuccess = ()=>resolve(req.result.reverse());
    req.onerror = (e)=>reject(e);
  });
}

function countPending(){
  return getAllEntries().then(rows=>rows.filter(r=>!r.synced).length);
}

function markEntrySynced(id){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('entries','readwrite');
    const store = tx.objectStore('entries');
    const req = store.get(id);
    req.onsuccess = ()=>{
      const entry = req.result;
      if(!entry){ resolve(null); return; }
      entry.synced = true;
      entry.syncError = null;
      const putReq = store.put(entry);
      putReq.onsuccess = ()=>resolve(entry);
      putReq.onerror = (e)=>reject(e);
    };
    req.onerror = (e)=>reject(e);
  });
}

function markEntryFailed(id, errorMsg){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('entries','readwrite');
    const store = tx.objectStore('entries');
    const req = store.get(id);
    req.onsuccess = ()=>{
      const entry = req.result;
      if(!entry){ resolve(null); return; }
      entry.syncError = errorMsg;
      const putReq = store.put(entry);
      putReq.onsuccess = ()=>resolve(entry);
      putReq.onerror = (e)=>reject(e);
    };
    req.onerror = (e)=>reject(e);
  });
}

/* =========================================================
   منطق الحساب — مطابق تماماً لصيغ الإكسل الفعلية
   ========================================================= */
function calcFuji(travelKm){
  const km = parseFloat(travelKm)||0;
  const cost = km>0 ? SETTINGS.travelCostPerKm : 0;
  const total = km>0 ? cost*km : 0;
  return {cost, total};
}

function calcBreakdown(income, parts, labor, party, eligible){
  income = parseFloat(income)||0;
  parts = parseFloat(parts)||0;
  labor = parseFloat(labor)||0;
  const net = income - parts - labor;
  const liability = (eligible === 'نعم') ? net * SETTINGS.pctRate : 0;
  const toYou = net - liability;
  return {net, liability, toYou};
}

let ddCounter = 0;
const ddState = {}; // id -> {value, options: [{value,label}] or grouped}

function buildDropdown(id, options, placeholder, onChangeFn, groups=null){
  ddState[id] = {value:'', onChangeFn};
  let optionsHtml = '';
  if(groups){
    groups.forEach(g=>{
      if(g.items.length === 0) return;
      optionsHtml += `<div class="dd-group-label">${g.label}</div>`;
      optionsHtml += g.items.map(v=>`<div class="dd-option" data-val="${v}" onclick="ddSelect('${id}','${v}')">${v}</div>`).join('');
    });
  } else {
    optionsHtml = options.map(v=>`<div class="dd-option" data-val="${v}" onclick="ddSelect('${id}','${v}')">${v}</div>`).join('');
  }
  return `
    <div class="dd" id="dd_${id}">
      <button type="button" class="dd-trigger placeholder" id="dd_trigger_${id}" onclick="ddToggle('${id}')">
        <span id="dd_label_${id}" data-placeholder="${placeholder}">${placeholder}</span>
        <span class="arrow">▾</span>
      </button>
      <div class="dd-panel">${optionsHtml}</div>
    </div>
  `;
}

function ddToggle(id){
  // اغلق كل القوائم الأخرى المفتوحة أولاً
  document.querySelectorAll('.dd.open').forEach(el=>{
    if(el.id !== 'dd_'+id) el.classList.remove('open');
  });
  document.getElementById('dd_'+id).classList.toggle('open');
}

function ddSelect(id, val){
  ddState[id].value = val;
  document.getElementById('dd_label_'+id).textContent = val;
  document.getElementById('dd_trigger_'+id).classList.remove('placeholder');
  document.getElementById('dd_'+id).classList.remove('open');
  // تمييز الاختيار الحالي
  document.querySelectorAll('#dd_'+id+' .dd-option').forEach(opt=>{
    opt.classList.toggle('selected', opt.dataset.val === val);
  });
  if(ddState[id].onChangeFn) ddState[id].onChangeFn(val);
}

function ddValue(id){
  return ddState[id] ? ddState[id].value : '';
}

function ddRebuild(id, options, groups=null){
  // إعادة بناء الخيارات داخل لوحة موجودة (مثلاً عند تغيير صاحب العمل لتحديث قائمة العملاء)
  const panel = document.querySelector('#dd_'+id+' .dd-panel');
  if(!panel) return;
  let optionsHtml = '';
  if(groups){
    groups.forEach(g=>{
      if(g.items.length === 0) return;
      optionsHtml += `<div class="dd-group-label">${g.label}</div>`;
      optionsHtml += g.items.map(v=>`<div class="dd-option" data-val="${v}" onclick="ddSelect('${id}','${v}')">${v}</div>`).join('');
    });
  } else {
    optionsHtml = options.map(v=>`<div class="dd-option" data-val="${v}" onclick="ddSelect('${id}','${v}')">${v}</div>`).join('');
  }
  panel.innerHTML = optionsHtml || `<div class="dd-option" style="color:var(--ink-dim)">لا يوجد عملاء مرتبطون بهذا الصاحب عمل</div>`;
  ddState[id].value = '';
  document.getElementById('dd_label_'+id).textContent = document.getElementById('dd_label_'+id).dataset.placeholder || '';
  document.getElementById('dd_trigger_'+id).classList.add('placeholder');
}

      <div class="sheet-title">🏍️ سجل المكنة</div>
      <div class="sheet-sub" id="motoSheetSub">يُكتب في سجل دفعات شراء الزيت بالجملة (ورقة محور المكنة)</div>
      <div class="row2" style="margin-bottom:16px;">
        <button type="button" class="tab-btn active" id="tabOilBtn" onclick="switchMotoTab('oil')">🛢️ شراء زيت بالجملة</button>
        <button type="button" class="tab-btn" id="tabPartBtn" onclick="switchMotoTab('part')">🔧 تغيير قطعة</button>
      </div>
      <div id="motoTabBody"></div>
      <button class="submit-btn" id="motoSubmitBtn" onclick="submitMotoOil()">حفظ دفعة الزيت</button>
      <button class="cancel-btn" onclick="closeSheet()">إلغاء</button>
    `;
  }

  document.getElementById('sheetBody').innerHTML = html;
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');

  if(actionId === 'visit'){
    updateLastKmHint();
  }
  if(actionId === 'moto'){

  }

/* ---- تحديث تلميح "آخر مسافة لهذا العميل" (previous value suggestion) ---- */
async function updateLastKmHint(){
  const client = ddValue('client');
  const hintEl = document.getElementById('lastKmHint');
  if(!hintEl) return;
  if(!client){ hintEl.textContent=''; return; }
  const rows = await getAllEntries();
  const last = rows.find(r=>r.type==='visit' && r.client===client);
  hintEl.textContent = last ? `آخر مسافة مسجّلة لـ ${client}: ${last.km} كم` : `لا توجد زيارات سابقة مسجّلة لـ ${client}`;
}
function onClientFujiChange(){ updateLastKmHint(); }

function closeSheet(){
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  Object.keys(ddState).forEach(k=>delete ddState[k]);
}
document.getElementById('backdrop').addEventListener('click', closeSheet);

/* ---- ربط ديناميكي: تغيير صاحب العمل يحدّث قائمة العملاء ---- */
function onOwnerChange(ownerVal){
  const clients = ownerVal ? (CLIENTS_BY_OWNER[ownerVal] || []) : ALL_CLIENTS;
  ddRebuild('client2', clients);
  updateBreakdownCalc();
}

/* =========================================================
   منطق إظهار الحقول الديناميكي للعملية المالية
   يحاكي صيغة B6 (المحور) + إظهار/إخفاء الحقول حسب التصنيف
   ========================================================= */
function onFinCatChange(cat){
  const info = getCategoryInfo(cat);
  document.getElementById('axisDisplay').style.display = 'block';
  document.getElementById('axisText').textContent = info.axis;

  const container = document.getElementById('dynamicFields');
  let html = '';

  if(BREAKDOWN_CATS.includes(cat)){
    // عطل/تركيب — يحتاج صاحب عمل + عميل + نوع عمل + تفاصيل مالية + تحصيل
    html += `<div class="field"><label>نوع العمل</label>${buildDropdown('worktype2', WORK_TYPES_MALI, 'اختر نوع العمل')}</div>`;
    html += `<div class="field"><label>صاحب العمل (إن وُجد وسيط)</label>${buildDropdown('owner', OWNERS, 'بدون صاحب عمل وسيط', onOwnerChange)}</div>`;
    html += `<div class="field"><label>العميل النهائي</label>${buildDropdown('client2', ALL_CLIENTS, 'اختر العميل')}</div>`;
    if(info.flow === 'in'){
      html += `<div class="field"><label>المبلغ (داخل) — جنيه</label><input type="number" id="f_income" inputmode="decimal" placeholder="0" oninput="updateBreakdownCalc()"></div>`;
      html += `<div class="row2">
        <div class="field"><label>قطع غيار (جنيه)</label><input type="number" id="f_parts" inputmode="decimal" placeholder="0" oninput="updateBreakdownCalc()"></div>
        <div class="field"><label>عمالة مباشرة (جنيه)</label><input type="number" id="f_labor" inputmode="decimal" placeholder="0" oninput="updateBreakdownCalc()"></div>
      </div>`;
      html += `<div class="calc-line"><span>الصافي</span><b id="calc_net">0</b></div>`;
      html += `<div class="calc-line"><span>نسبة 10% (إن وُجدت)</span><b id="calc_liab">0</b></div>`;
      html += `<div class="calc-line total"><span>يدخل جيبك</span><b id="calc_toyou">0</b></div>`;
    } else {
      html += `<div class="field"><label>المبلغ (خارج) — جنيه</label><input type="number" id="f_outAmount" inputmode="decimal" placeholder="0"></div>`;
    }
    html += `<div class="field"><label>حالة التحصيل</label>${buildDropdown('collectStatus', COLLECT_STATUS, 'اختر الحالة')}</div>`;
  } else if(MOTO_FINANCE_CATS.includes(cat)){
    // عمليات مالية متعلقة بالمكنة — تحتاج فقط مبلغ + كيلومترات اختيارية
    html += `<div class="field"><label>المبلغ (${info.flow==='in'?'داخل — إيراد':'خارج — مصروف'}) جنيه</label><input type="number" id="f_amount" inputmode="decimal" placeholder="0"></div>`;
    html += `<div class="field"><label>كيلومترات (إن أمكن تحديدها)</label><input type="number" id="f_km2" inputmode="decimal" placeholder="اختياري"></div>`;
  } else {
    // كل باقي التصنيفات (فوجي، صندوق 10%، مديونيات، مشاريع، معيشة) — حقل مبلغ موحّد + طرف اختياري
    html += `<div class="field"><label>المبلغ (${info.flow==='in'?'داخل — إيراد':'خارج — مصروف'}) جنيه</label><input type="number" id="f_amount" inputmode="decimal" placeholder="0"></div>`;
    html += `<div class="field"><label>الطرف (اختياري)</label>${buildDropdown('partyGeneric', [...OWNERS, ...ALL_CLIENTS], 'لا ينطبق')}</div>`;
  }

  container.innerHTML = html;
}

/* ---- حسابات لحظية تظهر أثناء الكتابة ---- */
function updateVisitCalc(){
  const km = document.getElementById('f_km').value;
  const {total} = calcFuji(km);
  document.getElementById('calc_travelcost').textContent = total.toFixed(0)+' جنيه';
}

function updateBreakdownCalc(){
  const incomeEl = document.getElementById('f_income');
  if(!incomeEl) return; // الحقول غير موجودة (تصنيف خارج لا داخل، مثلاً)
  const income = incomeEl.value;
  const parts = document.getElementById('f_parts').value;
  const labor = document.getElementById('f_labor').value;
  const owner = ddValue('owner');
  // ملاحظة: الأهلية تُقرأ من tblParties فعلياً عبر Graph API لاحقاً.
  // افتراضياً "نعم" إلى أن يتم الربط الحقيقي.
  const eligible = 'نعم';
  const {net, liability, toYou} = calcBreakdown(income, parts, labor, owner, eligible);
  document.getElementById('calc_net').textContent = net.toFixed(0);
  document.getElementById('calc_liab').textContent = liability.toFixed(0);
  document.getElementById('calc_toyou').textContent = toYou.toFixed(0);
}

    : 'يُكتب مباشرة في tblHistory — سجل تغييرات قطع الغيار';

  const submitBtn = document.getElementById('motoSubmitBtn');

    body.innerHTML = `
      <div class="field"><label>التاريخ</label><input type="date" id="f_date" value="${todayISO()}"></div>
      <div class="row2">
        <div class="field"><label>الكمية (لتر)</label><input type="number" id="f_oilqty" inputmode="decimal" placeholder="0" oninput="updateOilCalc()"></div>
        <div class="field"><label>سعر اللتر (جملة)</label><input type="number" id="f_oilprice" inputmode="decimal" placeholder="${SETTINGS.oilWholesalePrice}" value="${SETTINGS.oilWholesalePrice}" oninput="updateOilCalc()"></div>

    `;

    updateOilCalc();
  } else {
    body.innerHTML = `
      <div class="field"><label>التاريخ</label><input type="date" id="f_date" value="${todayISO()}"></div>
      <div class="field"><label>القطعة</label>${buildDropdown('partname', MOTO_PARTS, 'اختر القطعة')}</div>
      <div class="row2">
        <div class="field"><label>كم عند الخلع</label><input type="number" id="f_kmremoved" inputmode="decimal" placeholder="0"></div>
        <div class="field"><label>كم عند التركيب الجديد</label><input type="number" id="f_kminstalled" inputmode="decimal" placeholder="0"></div>
      </div>
      <div class="row2">
        <div class="field"><label>التكلفة (جنيه)</label><input type="number" id="f_partcost" inputmode="decimal" placeholder="0"></div>
        <div class="field"><label>مصدر الشراء</label>${buildDropdown('partsource', PART_SOURCES, 'اختر المصدر')}</div>
      </div>
      <div class="field" style="margin-top:14px"><label>ملاحظات</label><textarea id="f_notes" placeholder="اختياري"></textarea></div>

function updateOilCalc(){
  const qty = parseFloat(document.getElementById('f_oilqty').value)||0;

}

/* =========================================================
   الحفظ — يكتب محلياً فوراً، ثم يحاول المزامنة (هيكل جاهز)
   ========================================================= */
async function saveAndSync(entry){
  await addEntry(entry);
  showToast('تم الحفظ محلياً ✓');
  closeSheet();
  refreshRecent();
  refreshSyncStatus();
  attemptSync(); // محاولة مزامنة فورية (لا تحجب الحفظ المحلي إن فشلت)
}

function submitVisit(){
  const client = ddValue('client');
  const visitType = ddValue('visittype');
  const status = ddValue('status');
  const elevNum = ddValue('elevnum') || '1';
  const faultCode = ddValue('faultcode') || '-';
  const replacedPart = document.getElementById('f_replacedpart').value.trim() || '-';
  const location = document.getElementById('f_location').value.trim();
  const collected = ddValue('collected');
  const workHours = ddValue('workhours') || '3';
  if(!client){ showToast('من فضلك اختر العميل', true); return; }
  if(!document.getElementById('f_details').value.trim()){ showToast('من فضلك اكتب وصف العمل المنجز', true); return; }
  const km = document.getElementById('f_km').value;
  const {total} = calcFuji(km);
  const entry = {
    type:'visit', file:'fuji', table:'tblFuji',
    date: document.getElementById('f_date').value,
    client, location, elevNum, visitType, status, faultCode, replacedPart, collected, workHours,
    details: document.getElementById('f_details').value,
    km: parseFloat(km)||0,
    travelCost: total,
    collect: parseFloat(document.getElementById('f_collect').value)||0,
    notes: document.getElementById('f_notes').value,
    label: client + ' (مصعد ' + elevNum + ') — ' + (visitType||''),
    amount: parseFloat(document.getElementById('f_collect').value)||0,
  };
  saveAndSync(entry);
}

/* ---- حفظ العملية المالية الموحّدة — يبني الصف وفق التصنيف المختار، مطابقاً لصف الترحيل الأصلي ---- */
function submitFinance(){
  const cat = ddValue('fincat');
  if(!cat){ showToast('من فضلك اختر التصنيف', true); return; }
  const info = getCategoryInfo(cat);
  const date = document.getElementById('f_date').value;
  const desc = document.getElementById('f_desc').value;
  const notes = document.getElementById('f_notes').value;

  let entry = {
    type:'finance', file:'mali', table:'tblSegel',
    date, cat, axis: info.axis, desc, notes,
  };

  if(BREAKDOWN_CATS.includes(cat)){
    const owner = ddValue('owner');
    const client = ddValue('client2');
    const workType = ddValue('worktype2');
    const collectStatus = ddValue('collectStatus');
    if(!client){ showToast('من فضلك اختر العميل النهائي', true); return; }
    const partyLabel = owner ? `${owner} ← ${client}` : client;
    if(info.flow === 'in'){
      const income = document.getElementById('f_income').value;
      const parts = document.getElementById('f_parts').value;
      const labor = document.getElementById('f_labor').value;
      const {net, liability, toYou} = calcBreakdown(income, parts, labor, owner, 'نعم');
      entry = {...entry, owner, client, party:partyLabel, workType, collectStatus,
        income: parseFloat(income)||0, parts: parseFloat(parts)||0, labor: parseFloat(labor)||0,
        net, liability, toYou, amount: parseFloat(income)||0,
        label: cat+' — '+partyLabel};
    } else {
      const outAmount = parseFloat(document.getElementById('f_outAmount').value)||0;
      entry = {...entry, owner, client, party:partyLabel, workType, collectStatus,
        outAmount, amount: outAmount, label: cat+' — '+partyLabel};
    }
  } else if(MOTO_FINANCE_CATS.includes(cat)){
    const amount = parseFloat(document.getElementById('f_amount').value)||0;
    const km2 = parseFloat(document.getElementById('f_km2').value)||0;
    entry = {...entry, amount, km:km2, label: cat};
  } else {
    const amount = parseFloat(document.getElementById('f_amount').value)||0;
    const party = ddValue('partyGeneric');
    entry = {...entry, amount, party, label: party ? `${cat} — ${party}` : cat};
  }

  saveAndSync(entry);
}

function submitMotoOil(){
  const qty = parseFloat(document.getElementById('f_oilqty').value)||0;
  const price = parseFloat(document.getElementById('f_oilprice').value)||0;
  if(qty <= 0){ showToast('من فضلك أدخل الكمية بالتر', true); return; }
  const total = qty*price;
  const entry = {
    type:'moto_oil', file:'mali', table:'tblHistory', sheetSection:'oil_purchases',
    date: document.getElementById('f_date').value,
    qty, price, total,
    notes: document.getElementById('f_notes').value,
    label: `شراء زيت بالجملة — ${qty} لتر`,
    amount: total,
  };
  saveAndSync(entry);
}

function submitMotoPart(){
  const partName = ddValue('partname');
  const source = ddValue('partsource');
  if(!partName){ showToast('من فضلك اختر القطعة', true); return; }
  const kmRemoved = parseFloat(document.getElementById('f_kmremoved').value)||0;
  const kmInstalled = parseFloat(document.getElementById('f_kminstalled').value)||0;
  const cost = parseFloat(document.getElementById('f_partcost').value)||0;
  const entry = {
    type:'moto_part', file:'mali', table:'tblHistory', sheetSection:'part_changes',
    date: document.getElementById('f_date').value,
    partName, source, kmRemoved, kmInstalled, cost,
    notes: document.getElementById('f_notes').value,
    label: `تغيير قطعة — ${partName}`,
    amount: cost,
  };
  saveAndSync(entry);
}

/* =========================================================
   عرض السجل الأخير
   ========================================================= */
async function refreshRecent(){
  const rows = await getAllEntries();
  const list = document.getElementById('recentList');
  if(rows.length === 0){
    list.innerHTML = `<div class="empty-state">لا توجد عمليات مسجلة بعد<br>ابدأ بإضافة أول عملية من الأعلى</div>`;
    return;
  }
  list.innerHTML = rows.slice(0,25).map(r=>{
    const d = new Date(r.createdAt);
    const dateStr = d.toLocaleDateString('ar-EG', {day:'numeric', month:'short'});
    const timeStr = d.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
    let pillClass = r.synced ? 'synced' : 'pending';
    let pillText = r.synced ? 'متزامن' : 'محلي';
    if(!r.synced && r.syncError){ pillClass = 'failed'; pillText = 'فشلت المزامنة'; }
    const errorBlock = (!r.synced && r.syncError) ? `
      <div class="error-detail">
        <span>${r.syncError}</span>
        <button onclick="retryOne(${r.id})">إعادة المحاولة</button>
      </div>` : '';
    return `
      <div class="ticket-wrap">
      <div class="ticket">
        <div class="meta">
          <div class="top">${r.label||r.type}</div>
          <div class="sub">${dateStr} · ${timeStr}</div>
        </div>
        <div class="amt">${(r.amount||0).toFixed(0)} ج</div>
        <div class="pill ${pillClass}">${pillText}</div>
      </div>
      ${errorBlock}
      </div>
    `;
  }).join('');
}

async function retryOne(id){
  showToast('جاري إعادة المحاولة...');
  await attemptSync();
}

/* =========================================================
   حالة المزامنة — هيكل جاهز لربط Microsoft Graph API
   حالياً: لا يوجد اتصال فعلي. كل العمليات تبقى "محلي" بأمان.
   عند تفعيل الربط، attemptSync() سترفع المعلّقات للـ OneDrive.
   ========================================================= */
let isOnline = navigator.onLine;
window.addEventListener('online', ()=>{isOnline=true; refreshSyncStatus(); attemptSync();});
window.addEventListener('offline', ()=>{isOnline=false; refreshSyncStatus();});

async function refreshSyncStatus(){
  const pending = await countPending();
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if(pending === 0){
    dot.className = 'sync-dot off';
    txt.textContent = isOnline ? 'محفوظ محلياً' : 'بدون اتصال';
  } else {
    dot.className = 'sync-dot pending';
    txt.textContent = `${pending} عملية بانتظار الرفع`;
  }
}

/* =========================================================
   تحويل كل نوع إدخال إلى صف بترتيب الأعمدة الصحيح في جدول الإكسل
   null = اترك الخلية فارغة لتحسبها صيغة الإكسل تلقائياً
   ========================================================= */
function buildRowForEntry(entry){
  if(entry.type === 'visit'){
    // tblFuji أعمدة: A=م(صيغة) B=التاريخ C=العميل D=الموقع E=رقم المصعد F=الشهر(صيغة) G=السنة(صيغة)
    // H=نوع الزيارة I=وصف العمل J=كود العطل K=الجزء المستبدل L=حالة المصعد M=تم التحصيل
    // N=المبلغ المحصل O=ساعات العمل P=المسافة Q=سعر الكم(صيغة) R=تكلفة التنقل(صيغة) S=ملاحظات
    return {
      table: 'tblFuji', file: 'fuji',
      cells: {
        B: entry.date, C: entry.client, D: entry.location||'', E: entry.elevNum,
        H: entry.visitType, I: entry.details, J: entry.faultCode, K: entry.replacedPart,
        L: entry.status, M: entry.collected, N: entry.collect, O: entry.workHours,
        P: entry.km, S: entry.notes||'',
      },
    };
  }
  if(entry.type === 'finance'){
    // tblSegel أعمدة: A=م(صيغة) B=التاريخ C=التصنيف D=المحور(صيغة) E=داخل F=خارج G=الرصيد(صيغة)
    // H=نوع العمل I=صاحب العمل/عميل J=البيان K=حالة التحصيل L=ملاحظات M=مؤهل10%(صيغة)
    const isIn = getCategoryInfo(entry.cat).flow === 'in';
    const partyField = entry.party || entry.client || '';
    let amountIn = null, amountOut = null;
    if(BREAKDOWN_CATS.includes(entry.cat)){
      amountIn = isIn ? entry.income : null;
      amountOut = isIn ? null : entry.outAmount;
    } else {
      amountIn = isIn ? entry.amount : null;
      amountOut = isIn ? null : entry.amount;
    }
    return {
      table: 'tblSegel', file: 'mali',
      cells: {
        B: entry.date, C: entry.cat, E: amountIn, F: amountOut,
        H: entry.workType||'', I: partyField, J: entry.desc||'',
        K: entry.collectStatus||'', L: entry.notes||'',
      },
    };
  }
  if(entry.type === 'moto_part'){
    // tblHistory أعمدة: A=م(صيغة) B=تاريخ التغيير C=اسم القطعة D=كم عند الخلع E=كم عند التركيب(صيغة)
    // F=العمر الفعلي(صيغة) G=التكلفة H=مصدر الشراء I=ملاحظات
    return {
      table: 'tblHistory', file: 'mali',
      cells: {
        B: entry.date, C: entry.partName, D: entry.kmRemoved,
        G: entry.cost, H: entry.source||'', I: entry.notes||'',
      },
    };
  }
  if(entry.type === 'moto_oil'){
    // سجل شراء الزيت بالجملة — صف مالي ضمن tblSegel بتصنيف مخصص
    return {
      table: 'tblSegel', file: 'mali',
      cells: {
        B: entry.date, C: '🏍️ مكنة — شراء زيت بالجملة', F: entry.total,
        J: `${entry.qty} لتر × ${entry.price} جنيه`, L: entry.notes||'',
      },
    };
  }
  return null;
}

/* =========================================================
   محاولة المزامنة الفعلية — رفع كل العمليات المعلّقة للإكسل الحقيقي
   تسلسلية (لا متزامنة) لتجنب تعارض جلسات الكتابة على نفس الملف
   ========================================================= */
let syncInProgress = false;

async function attemptSync(){
  if(syncInProgress) return; // لا تبدأ مزامنة جديدة فوق أخرى جارية
  if(!currentAccount || !isOnline) { refreshSyncStatus(); return; }

  syncInProgress = true;
  try{
    const rows = await getAllEntries();
    const pending = rows.filter(r=>!r.synced);
    for(const entry of pending){
      const rowSpec = buildRowForEntry(entry);
      if(!rowSpec) continue;
      try{
        await graphAddTableRow(rowSpec.file, rowSpec.table, rowSpec.cells);
        await markEntrySynced(entry.id);
      } catch(err){
        console.error('فشلت مزامنة عملية:', entry.id, err);
        await markEntryFailed(entry.id, err.message || 'خطأ غير معروف');
        // نوقف المحاولات هنا لهذه الجلسة (مثلاً انتهت الجلسة) ونكمل لاحقاً
        break;
      }
    }
  } finally {
    syncInProgress = false;
    refreshSyncStatus();
    refreshRecent();
  }
}


/* =========================================================
   تشغيل
   ========================================================= */
function showToast(msg, isErr=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr?' err':'');
  setTimeout(()=>{t.className='toast'+(isErr?' err':'');}, 2200);
}

async function init(){
  loadCachedLists();      // أولاً: عرض فوري من آخر نسخة محلية معروفة (يعمل حتى دون اتصال)
  db = await openDB();
  renderTiles();
  await refreshRecent();
  await initAuth();        // تهيئة تسجيل الدخول، يكتشف إن كنت مسجّلاً مسبقاً
  await refreshSyncStatus();
  if(currentAccount){
    await refreshLiveLists(); // محاولة تحديث القوائم من الإكسل الحقيقي فوراً
    attemptSync();             // محاولة رفع أي عمليات معلّقة من جلسات سابقة
  }
}
init();
</script>
